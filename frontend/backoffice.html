<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>Backoffice - PitchBooking</title>
</head>

<body>
    <h1>Administração</h1>
    <nav>
        <a href="../backend/logout.php">Terminar sessão</a>
    </nav>
    <p>Perfil: <strong><span id="perfil"></span></strong></p>

    <div id="menu"></div>
    <h2 id="reservas">Reservas do Clube</h2>
    <div id="lista-reservas-bo"></div>
    <h2 id="pagamentos">Registar Pagamento</h2>
    <div>
        <label>ID da Reserva:</label>
        <input type="number" id="pag-reserva">
        <label>Montante:</label>
        <input type="number" id="pag-montante" step="0.01">
        <label>Tipo:</label>
        <select id="pag-tipo">
            <option value="total">Total</option>
            <option value="parcial">Parcial</option>
        </select>
        <button onclick="registarPagamento()">Registar</button>
        <span id="pag-msg"></span>
    </div>
    <h2 id="atletas">Gestão de Atletas</h2>
    <div id="lista-atletas"></div>

    <h2 id="campos">Gestão de Campos</h2>
    <div id="seccao-campos"></div>

    <h2 id="relatorios">Relatórios</h2>
    <div id="seccao-relatorios"></div>

    <script>
        fetch('../backend/user.php')
            .then(res => res.json())
            .then(info => {
                const role = info.dados.role;
                document.getElementById('perfil').textContent = role;

                const menu = document.getElementById('menu');

                // Funcionalidades comuns a gestor e rececionista
                let html = `
                    <h2>Operações</h2>
                    <ul>
                        <li><a href="#reservas">Gerir reservas</a></li>
                        <li><a href="#pagamentos">Registar pagamentos</a></li>
                        <li><a href="#atletas">Gerir atletas</a></li>
                        <li><a href="#relatorios">Relatórios</a></li>
                    </ul>`;

                // Só o gestor vê a gestão de campos e preços
                if (role === 'gestor') {
                    html += `
                        <h2>Apenas Gestor</h2>
                        <ul>
                            <li><a href="#campos">Gerir campos e preços</a></li>
                        </ul>`;
                }

                menu.innerHTML = html;

                // Carrega as reservas do clube
                carregarReservas();
                carregarAtletas();
                carregarRelatorios();
                if (role === 'gestor') {
                    carregarCampos();
                }



            })
            .catch(err => {
                document.getElementById('menu').innerHTML = 'Erro ao carregar o backoffice.';
            });

        function carregarReservas() {
            fetch('../backend/reserva.php?acao=listar')
                .then(res => res.json())
                .then(reservas => {
                    const div = document.getElementById('lista-reservas-bo');
                    if (reservas.length === 0) {
                        div.innerHTML = '<p>Não há reservas.</p>';
                        return;
                    }
                    let html = '<table border="1"><tr><th>Atleta</th><th>Campo</th><th>Data</th><th>Hora</th><th>Total</th><th>Estado</th><th>Check-in</th><th>Ações</th></tr>';
                    reservas.forEach(r => {
                        html += `<tr>
                            <td>${r.atleta}</td>
                            <td>${formatarTipo(r.tipo_campo)} (${r.identificador})</td>
                            <td>${r.data_jogo}</td>
                            <td>${r.hora_inicio} - ${r.hora_fim}</td>
                            <td>${r.valor_total}€</td>
                            <td>${r.estado}</td>
                            <td>${r.check_in == 1 ? 'Sim' : 'Não'}</td>
                            <td>
                                <button onclick="cancelarReserva(${r.id})">Cancelar</button>
                                <button onclick="fazerCheckin(${r.id})">Check-in</button>
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    div.innerHTML = html;
                });
        }

        function cancelarReserva(id) {
            const dados = new FormData();
            dados.append('acao', 'cancelar');
            dados.append('reserva_id', id);
            fetch('../backend/reserva.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.text())
                .then(() => carregarReservas());
        }

        function fazerCheckin(id) {
            const dados = new FormData();
            dados.append('acao', 'checkin');
            dados.append('reserva_id', id);
            fetch('../backend/reserva.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.text())
                .then(() => carregarReservas());
        }

        function registarPagamento() {
            const dados = new FormData();
            dados.append('reserva_id', document.getElementById('pag-reserva').value);
            dados.append('montante', document.getElementById('pag-montante').value);
            dados.append('tipo', document.getElementById('pag-tipo').value);
            fetch('../backend/pagamento.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.text())
                .then(msg => {
                    document.getElementById('pag-msg').textContent = msg;
                });
        }

        function carregarAtletas() {
            fetch('../backend/user.php?acao=listar_atletas')
                .then(res => res.json())
                .then(atletas => {
                    const div = document.getElementById('lista-atletas');
                    let html = '<table border="1"><tr><th>Nome</th><th>Email</th><th>Documento</th><th>Estado</th><th>Docs</th><th>Ações</th></tr>';
                    atletas.forEach(a => {
                        html += `<tr>
                            <td>${a.nome}</td>
                            <td>${a.email}</td>
                            <td>${a.tipo_doc} - ${a.num_doc}</td>
                            <td>${a.estado}</td>
                            <td>${a.docs_verificados == 1 ? 'Sim' : 'Não'}</td>
                            <td>
                                <button onclick="verificarDocs(${a.id})">Verificar docs</button>
                                <button onclick="alterarEstado(${a.id}, '${a.estado == 'ativo' ? 'inativo' : 'ativo'}')">${a.estado == 'ativo' ? 'Inativar' : 'Ativar'}</button>
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    div.innerHTML = html;
                });
        }

        function verificarDocs(id) {
            const dados = new FormData();
            dados.append('acao', 'verificar_docs');
            dados.append('atleta_id', id);
            fetch('../backend/user.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.json())
                .then(() => carregarAtletas());
        }

        function alterarEstado(id, novoEstado) {
            const dados = new FormData();
            dados.append('acao', 'alterar_estado');
            dados.append('atleta_id', id);
            dados.append('estado', novoEstado);
            fetch('../backend/user.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.json())
                .then(() => carregarAtletas());
        }

        function carregarCampos() {
            fetch('../backend/campos.php?acao=listar_todos')
                .then(res => res.json())
                .then(campos => {
                    const div = document.getElementById('seccao-campos');
                    let html = '<table border="1"><tr><th>ID</th><th>Identificador</th><th>Tipo</th><th>Preço</th><th>Luz</th><th>Material</th><th>Estado</th><th>Ações</th></tr>';
                    campos.forEach(c => {
                        html += `<tr>
                            <td>${c.id}</td>
                            <td>${c.identificador}</td>
                            <td>${formatarTipo(c.tipo_campo)}</td>
                            <td>${c.preco_base}€</td>
                            <td>${c.custo_luz}€</td>
                            <td>${c.custo_material}€</td>
                            <td>${c.estado}</td>
                            <td><button onclick="apagarCampo(${c.id})">Apagar</button></td>
                        </tr>`;
                    });
                    html += '</table>';
                    html += `
                        <h3>Adicionar Campo</h3>
                        <input id="c-id" placeholder="Identificador (ex: PAD-04)">
                        <select id="c-tipo">
                            <option value="padel_coberto">Pádel Coberto</option>
                            <option value="padel_descoberto">Pádel Descoberto</option>
                            <option value="tenis_terra">Ténis Terra</option>
                            <option value="tenis_rapido">Ténis Rápido</option>
                        </select>
                        <input id="c-desc" placeholder="Descrição">
                        <input id="c-preco" type="number" step="0.01" placeholder="Preço base">
                        <input id="c-luz" type="number" step="0.01" placeholder="Custo luz">
                        <input id="c-material" type="number" step="0.01" placeholder="Custo material">
                        <button onclick="criarCampo()">Criar</button>`;
                    div.innerHTML = html;
                });
        }

        function apagarCampo(id) {
            const dados = new FormData();
            dados.append('acao', 'apagar');
            dados.append('id', id);
            fetch('../backend/campos.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.json())
                .then(() => carregarCampos());
        }

        function criarCampo() {
            const dados = new FormData();
            dados.append('acao', 'criar');
            dados.append('identificador', document.getElementById('c-id').value);
            dados.append('tipo_campo', document.getElementById('c-tipo').value);
            dados.append('descricao', document.getElementById('c-desc').value);
            dados.append('preco_base', document.getElementById('c-preco').value);
            dados.append('custo_luz', document.getElementById('c-luz').value);
            dados.append('custo_material', document.getElementById('c-material').value);
            fetch('../backend/campos.php', {
                    method: 'POST',
                    body: dados
                })
                .then(res => res.json())
                .then(() => carregarCampos());
        }

        function carregarRelatorios() {
            fetch('../backend/reserva.php?acao=relatorios')
                .then(res => res.json())
                .then(rel => {
                    const div = document.getElementById('seccao-relatorios');
                    let html = '';

                    // Taxa de ocupação
                    const ocupacao = rel.total_campos > 0 ?
                        Math.round((rel.reservas_ativas / rel.total_campos) * 100) :
                        0;
                    html += `<h3>Taxa de Ocupação</h3>
                        <p>${rel.reservas_ativas} reservas ativas em ${rel.total_campos} campos (${ocupacao}%)</p>`;

                    // Estado das reservas
                    html += '<h3>Estado das Reservas</h3><ul>';
                    rel.por_estado.forEach(e => {
                        html += `<li>${e.estado}: ${e.total}</li>`;
                    });
                    html += '</ul>';

                    // Receita por modalidade
                    html += '<h3>Receita por Modalidade</h3><ul>';
                    if (rel.por_modalidade.length === 0) {
                        html += '<li>Sem pagamentos registados.</li>';
                    } else {
                        rel.por_modalidade.forEach(m => {
                            html += `<li>${formatarTipo(m.tipo_campo)}: ${m.total}€</li>`;
                        });
                    }
                    html += '</ul>';

                    div.innerHTML = html;
                });
        }

        function formatarTipo(t) {
            return t.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
    </script>
</body>

</html>
