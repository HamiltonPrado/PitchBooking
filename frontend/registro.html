<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>Registo - PitchBooking</title>
</head>

<body>
    <h2>Criar conta</h2>

    <form action="../backend/registo.php" method="post">
        <label>Nome:</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <label>Tipo de documento:</label><br>
        <select name="tipo_doc">
            <option value="cc">Cartão de Cidadão</option>
            <option value="passaporte">Passaporte</option>
            <option value="outro">Outro</option>
        </select><br><br>

        <label>Nº do documento:</label><br>
        <input type="text" name="num_doc" required><br><br>

        <label>NIF (opcional):</label><br>
        <input type="text" name="nif"><br><br>

        <button type="submit">Registar</button>
    </form>
    <p>Já tem conta? <a href="login.html">Entre aqui</a></p>
    <p><a href="index.html">Voltar ao início</a></p>
</body>

</html>
