<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>Registro - PitchBooking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container my-5">
        <h2>Criar conta</h2>

        <form action="../backend/registro.php" method="post">
            <div class="mb-3">
                <label class="form-label">Nome:</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de documento:</label>
                <select name="tipo_doc" class="form-select">
            <option value="cc">Cartão de Cidadão</option>
            <option value="passaporte">Passaporte</option>
            <option value="outro">Outro</option>
        </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Nº do documento:</label>
                <input type="text" name="num_doc" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">NIF (opcional):</label>
                <input type="text" name="nif" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Registar</button>

        </form>
        <p>Já tem conta? <a href="login.html">Entre aqui</a></p>
        <p><a href="index.html">Voltar ao início</a></p>
    </div>
</body>

</html>
