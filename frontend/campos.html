<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>Reservar Campo - PitchBooking</title>
</head>

<body>
    <h1>Campos Disponíveis</h1>
    <div id="lista-campos"></div>
    <script>
        fetch('../backend/campos.php')
            .then(res => res.json())
            .then(campos => {
                const div = document.getElementById('lista-campos');
                campos.forEach(campo => {
                    div.innerHTML += `
                        <div>
                               <h3>${formatarTipo(campo.tipo_campo)}</h3>
                            <p>Preço base: ${campo.preco}€</p>
                            <p>Luz: ${campo.luz}€ | Material: ${campo.material}€</p>
                            <a href="reserva.html?tipo=${campo.tipo_campo}">Reservar</a>
                        </div>
                        <hr>`;
                });
            })
            .catch(err => {
                document.getElementById('lista-campos').innerHTML = 'Erro ao carregar os campos.';
            });

        function formatarTipo(t) {
            return t.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
    </script>
</body>

</html>
