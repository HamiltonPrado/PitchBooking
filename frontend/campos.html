<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>Reservar Campo - PitchBooking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container my-5">
        <h1>Campos Disponíveis</h1>
        <nav class="mb-3">
            <a href="userdashboard.html">A minha área</a> |
            <a href="perfil.html">O meu perfil</a> |
            <a href="../backend/logout.php">Terminar sessão</a>
        </nav>

        <div id="lista-campos" class="row ">

        </div>


        <script>
            fetch('../backend/campos.php')
                .then(res => res.json())
                .then(campos => {
                    const div = document.getElementById('lista-campos');
                    campos.forEach(campo => {
                        div.innerHTML += `
                        <div class="col-md-6 mb-3">
                            <div class="card p-3">
                               <h3>${formatarTipo(campo.tipo_campo)}</h3>
                            <p>Preço base: ${campo.preco}€</p>
                            <p>Luz: ${campo.luz}€ | Material: ${campo.material}€</p>
                            <a href="reserva.html?tipo=${campo.tipo_campo}" class="btn btn-success">Reservar</a>
                        </div>
                          </div>`;
                    });
                })
                .catch(err => {
                    document.getElementById('lista-campos').innerHTML = 'Erro ao carregar os campos.';
                });

            function formatarTipo(t) {
                return t.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            }
        </script>
    </div>
</body>

</html>
