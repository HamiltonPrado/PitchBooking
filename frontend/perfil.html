<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <title>O Meu Perfil - PitchBooking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container my-5">

        <h1>O Meu Perfil</h1>
        <nav class="mb-3">
            <a href="userdashboard.html">A minha área</a> |
            <a href="campos.html">Reservar campo</a> |
            <a href="../backend/logout.php">Terminar sessão</a>
        </nav>

        <h2>Dados Pessoais</h2>
        <div id="dados-pessoais"></div>

        <h2>As Minhas Reservas</h2>
        <div id="lista-reservas"></div>

        <script>
            fetch('../backend/user.php')
                .then(res => res.json())
                .then(info => {
                    // Mostra os dados pessoais
                    const d = info.dados;
                    document.getElementById('dados-pessoais').innerHTML = `
                    <p>Nome: ${d.nome}</p>
                    <p>Email: ${d.email}</p>
                    <p>Documento: ${d.tipo_doc} - ${d.num_doc}</p>
                    <p>NIF: ${d.nif ?? 'Não fornecido'}</p>
                    <p>Documentos verificados: ${d.docs_verificados == 1 ? 'Sim' : 'Não'}</p>`;

                    // Mostra as reservas
                    const div = document.getElementById('lista-reservas');
                    if (info.reservas.length === 0) {
                        div.innerHTML = '<p>Ainda não tem reservas.</p>';
                    } else {
                        info.reservas.forEach(r => {
                            div.innerHTML += `
                            <div>
                                <strong>${formatarTipo(r.tipo_campo)}</strong> (${r.identificador})<br>
                                ${r.data_jogo} | ${r.hora_inicio} - ${r.hora_fim}<br>
                                Total: ${r.valor_total}€ | Estado: ${r.estado} |
                                Check-in: ${r.check_in == 1 ? 'Sim' : 'Não'}
                            </div>
                            <hr>`;
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('dados-pessoais').innerHTML = 'Erro ao carregar o perfil.';
                });

            function formatarTipo(t) {
                return t.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            }
        </script>
    </div>
</body>

</html>
